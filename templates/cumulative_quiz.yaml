# Cumulative quiz covering modules X-Y
# 8-10 questions, mix of types
# source_modules: which module(s) each question covers
# Answer distribution: rotate across A/B/C/D, no more than 2 consecutive same letter

- id: "cum.1"
  type: mcq
  question: "[Cross-module question connecting concepts from multiple modules]"
  source_modules: [1, 2]
  options:
    A: "[Distractor]"
    B: "[Correct]"
    C: "[Distractor]"
    D: "[Distractor]"
  answer: B
  explanation: "[Why B correct, referencing concepts from both modules]"
  difficulty: 2
  tags: [cross-module, terminology]

- id: "cum.2"
  type: mcq
  question: "[Application question spanning modules]"
  source_modules: [2, 3]
  options:
    A: "[Distractor]"
    B: "[Distractor]"
    C: "[Correct]"
    D: "[Distractor]"
  answer: C
  explanation: "[Reasoning chain across modules]"
  difficulty: 2
  tags: [cross-module, application]

- id: "cum.3"
  type: mcq
  question: "[Scenario combining knowledge from modules]"
  source_modules: [1, 3]
  options:
    A: "[Correct]"
    B: "[Distractor]"
    C: "[Distractor]"
    D: "[Distractor]"
  answer: A
  explanation: "[Scenario logic referencing multiple modules]"
  difficulty: 3
  tags: [cross-module, scenario]

- id: "cum.4"
  type: mcq
  question: "[Comparison across modules]"
  source_modules: [2, 4]
  options:
    A: "[Distractor]"
    B: "[Distractor]"
    C: "[Distractor]"
    D: "[Correct]"
  answer: D
  explanation: "[Why D correct]"
  difficulty: 2
  tags: [cross-module, comparison]

- id: "cum.5"
  type: cloze
  question: "Complete: [sentence connecting concepts from modules with {blank}]"
  source_modules: [1, 2]
  answer: "[blank term]"
  explanation: "[Why this term, referencing both modules]"
  difficulty: 1
  tags: [cross-module, recall]

- id: "cum.6"
  type: cloze
  question: "Complete: [another cross-module sentence with {blank}]"
  source_modules: [3, 4]
  answer: "[blank term]"
  explanation: "[Why this term]"
  difficulty: 1
  tags: [cross-module, recall]

- id: "cum.7"
  type: cloze
  question: "Complete: [synthesis sentence with {blank}]"
  source_modules: [2, 5]
  answer: "[blank term]"
  explanation: "[Why this term]"
  difficulty: 2
  tags: [cross-module, synthesis]

- id: "cum.8"
  type: tf
  statement: "[Statement combining concepts from multiple modules]"
  source_modules: [1, 3]
  answer: true
  explanation: "[Why true, referencing specific concepts from each module]"
  difficulty: 1
  tags: [cross-module, conceptual]

- id: "cum.9"
  type: tf
  statement: "[Plausible but incorrect statement spanning modules]"
  source_modules: [2, 4]
  answer: false
  explanation: "[Why false, explaining the misconception]"
  difficulty: 2
  tags: [cross-module, misconception]

- id: "cum.10"
  type: tf
  statement: "[Advanced statement requiring synthesis]"
  source_modules: [3, 5]
  answer: true
  explanation: "[Why true, with detailed reasoning]"
  difficulty: 3
  tags: [cross-module, synthesis]

# Mix: 4 MCQ, 3 cloze, 3 T/F = 10 questions
# Difficulty: 40% d1, 40% d2, 20% d3
# Answer distribution (MCQ): A=1, B=1, C=1, D=1 — rotate, no consecutive repeats
